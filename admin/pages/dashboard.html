<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Harzo Dashboard</title>

  <script>
  if (sessionStorage.getItem("isAdminLoggedIn") !== "true") {
    window.location.href = "/3172004/login.html";
  }
</script>

  <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>HARZO</h2>
    <ul>
      <li><a href="dashboard.html" class="active">Dashboard</a></li>
      <li><a href="products.html">Products</a></li>
    
      <li><a href="orders.html">Orders</a></li>
      <li><a href="users.html">Users</a></li>
      
      <li><a href="banner.html">Banners</a></li>
    </ul>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Cards (REAL DATA) -->
    <div class="cards">
      <div class="card">
        📦 Total Products
        <h3 id="totalProducts">0</h3>
      </div>

      <div class="card">
        🛒 Total Orders
        <h3 id="totalOrders">0</h3>
      </div>

      <div class="card">
        💰 Total Revenue
        <h3 id="totalRevenue">₹0</h3>
      </div>
    </div>

    <!-- Graph -->
    <div class="graph">
      <h2>Orders Graph</h2>
      <canvas id="chart"></canvas>
    </div>

    <!-- Middle -->
    <div class="row">

      <div class="box">
        <h3>🏆 Top Products</h3>
        <ul id="topProducts">
          <li>Loading...</li>
        </ul>
      </div>

      <div class="box">
        <h3>⚠️ Low Stock</h3>
        <ul id="lowStock">
          <li>Loading...</li>
        </ul>
      </div>

    </div>

    <!-- Bottom -->
    <div class="row">

      <div class="box">
        <h3>👤 Recent Users</h3>
        <ul id="recentUsers">
          <li>Loading...</li>
        </ul>
      </div>

      <div class="box">
        <h3>📦 Recent Orders</h3>
        <ul id="recentOrders">
          <li>Loading...</li>
        </ul>
      </div>

    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="../js/dashboard.js"></script>

</body>
</html>
